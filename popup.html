<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>TrenGIF</title>
</head>
<body>
  <header>
    <h1>Search for a GIF</h1>
  </header>

  <main>
    <form id="searchForm" autocomplete="off">
      <label class="visually-hidden" for="searchTermInput">Search term</label>
      <input
        id="searchTermInput"
        name="searchTerm"
        type="search"
        placeholder="Try: happy, dance, cat…"
        autofocus
        required
      />
      <button id="searchButton" type="submit">Go</button>
    </form>

    <section id="results" aria-live="polite">
      <p id="status" class="status" role="status"></p>
      <div id="gif" class="gif"></div>
      <div id="actions" class="actions" hidden>
        <button id="shuffleButton" type="button" class="shuffle">
          Show me something else!
        </button>
        <button id="copyButton" type="button" class="copy">Copy link</button>
      </div>
    </section>
  </main>

  <footer>
    <p class="attribution">Powered By GIPHY</p>
  </footer>

  <script src="config.js"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
